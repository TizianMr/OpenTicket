<div
  class="dropzone mt-2 rounded border border-dashed border-slate-500 bg-slate-900/60 p-4 text-center"
  [class.dragging]="isDragging()"
  tabindex="0"
  role="button"
  aria-label="Drag files here or click to select"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
>
  @if (droppedFiles().length > 0) {
    <div class="mt-2 text-sm text-slate-200">
      <div class="gap-2 grid grid-cols-3 max-h-82 overflow-y-auto">
        @for (file of droppedFiles(); track file.name) {
          <div class="flex items-center flex-col">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-18"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"
              />
            </svg>
            <div class="flex flex-col w-full">
              <span class="truncate">{{ file.name }}</span>
              <button
                type="button"
                class="text-red-500 hover:text-red-700 cursor-pointer"
                aria-label="Remove file"
                (click)="onFileRemove($event, file.name)"
              >
                Delete
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  } @else {
    <p class="text-sm text-slate-300">Drag files here, or click to browse files</p>
  }
  <input
    #fileInput
    type="file"
    multiple
    hidden
    (change)="onFileSelect($event)"
    aria-label="Select files"
  />
</div>
