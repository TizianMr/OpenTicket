<div class="w-[85vw] h-screen m-auto flex flex-col">
  <div class="flex flex-1 justify-around items-center">
    <app-ticket-statistic
      title="Open Tickets"
      icon="circle-half"
      [number]="12" />
    <app-ticket-statistic
      title="Tickets in progress"
      icon="in-progress"
      [number]="12" />

    <app-ticket-statistic
      title="Closed Tickets"
      icon="circle-check"
      [number]="12" />
  </div>

  <button
    class="bg-accent hover:bg-accent/80 font-bold py-2 px-4 my-5 rounded inline-flex items-center gap-1 self-end"
    type="button"
    aria-label="Create new ticket"
    (click)="modalService.open('create-ticket')">
    <app-icon name="document-plus" />
    <span>Create ticket</span>
  </button>

  <div class="flex-4 flex min-h-0">
    <app-ticket-table #ticketTable class="flex flex-col flex-1 min-h-0 w-full mb-4" />
  </div>
</div>

<!-- Modals -->
<app-create-ticket
  [isOpen]="modalService.isOpen('create-ticket')"
  (modalClose)="modalService.close('create-ticket')"
  [appModal]="'create-ticket'"
  (submitted)="ticketTable.reload()" />
