<div class="w-[85vw] m-auto flex flex-col">
  <div class="flex mt-3 justify-around mb-10">
    <div class="bg-surface rounded-md flex flex-col py-5 px-9 gap-3">
      <div class="flex items-center gap-2">
        <div class="rounded-full h-10 w-10 flex justify-center items-center bg-primary">
          <svg circle-half></svg>
        </div>
        <p class="text-lg font-bold">Open Tickets</p>
      </div>
      <p class="text-3xl text-end">12</p>
    </div>

    <div class="bg-surface rounded-md flex flex-col py-5 px-9 gap-3">
      <div class="flex items-center gap-2">
        <div class="rounded-full h-10 w-10 flex justify-center items-center bg-primary">
          <svg in-progress></svg>
        </div>
        <p class="text-lg font-bold">Tickets in progress</p>
      </div>
      <p class="text-3xl text-end">12</p>
    </div>

    <div class="bg-surface rounded-md flex flex-col py-5 px-9 gap-3">
      <div class="flex items-center gap-2">
        <div class="rounded-full h-10 w-10 flex justify-center items-center bg-primary">
          <svg circle-check></svg>
        </div>
        <p class="text-lg font-bold">Closed Tickets</p>
      </div>
      <p class="text-3xl text-end">12</p>
    </div>
  </div>

  <button
    class="bg-accent hover:bg-accent/80 font-bold py-2 px-4 my-5 rounded inline-flex items-center gap-1 self-end"
    type="button"
    aria-label="Create new ticket"
    (click)="modalService.open('create-ticket')">
    <svg document-plus></svg>
    <span>Create ticket</span>
  </button>

  <app-ticket-table #ticketTable />

  <!-- Modals -->
  <app-create-ticket
    [isOpen]="modalService.isOpen('create-ticket')"
    (modalClose)="modalService.close('create-ticket')"
    [appModal]="'create-ticket'"
    (submitted)="ticketTable.reload()" />
</div>
