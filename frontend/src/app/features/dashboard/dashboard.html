<div class="w-[85vw] m-auto flex flex-col">
  <button
    class="bg-accent hover:bg-accent/80 font-bold py-2 px-4 my-5 rounded inline-flex items-center gap-1 self-end"
    type="button"
    aria-label="Create new ticket"
    (click)="openModal()">
    <svg document-plus></svg>
    <span>Create ticket</span>
  </button>

  <app-create-ticket
    [isOpen]="modalOpen()"
    (modalClose)="closeModal()" />

  <app-ticket-table />
</div>
