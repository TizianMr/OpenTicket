<div class="grid bg-primary border border-elevated rounded-lg shadow-sm px-4 py-3"
  [class]="'grid-cols-' + headers().length">
  @for (header of headers(); track $index) {
  <div class="px-2 font-semibold flex items-center gap-3">
    <span>{{ header.label }}</span>
    <div class="flex flex-col">
      <button (click)="onSort(header.key, sortDirection.ASC)">
        <svg chevron-up></svg>
      </button>
      <button (click)="onSort(header.key, sortDirection.DESC)">
        <svg chevron-down></svg>
      </button>
    </div>
  </div>
  }
</div>
