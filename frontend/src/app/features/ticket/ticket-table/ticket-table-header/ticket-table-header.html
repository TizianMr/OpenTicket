<div
  class="grid bg-primary border border-elevated rounded-lg shadow-sm px-4 py-3"
  [class]="'grid-cols-' + headers().length">
  @for (header of headers(); track $index) {
    <div class="px-2 font-semibold flex items-center gap-3">
      <span>{{ header.label }}</span>
      <div class="flex flex-col">
        <button
          class="hover:bg-elevated rounded-xs"
          (click)="onSort(header.key)">
          @switch (header.sortDirection) {
            @case (sortDirection.ASC) {
              <app-icon name="sort-asc" />
            }
            @case (sortDirection.DESC) {
              <app-icon name="sort-desc" />
            }
            @default {
              <app-icon name="sort-idle" />
            }
          }
        </button>
      </div>
    </div>
  }
</div>
