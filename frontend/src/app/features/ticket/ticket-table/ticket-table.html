<table
  class="table-fixed w-full max-h-[80vh] border-2 bg-surface border-elevated rounded-md border-separate border-spacing-0">
  <thead class="text-left h-10 bg-primary">
    <tr>
      @for (headerItem of headers; track $index) {
      <th class="first:rounded-tl-md last:rounded-tr-md first:pl-4">{{headerItem}}</th>
      }
    </tr>
  </thead>
  <tbody class="content-evenly">
    @if (tableState().totalElements !== 0) {
    <app-ticket-table-empty />
    } @else { @for (ticket of tableState().content; track ticket.id) {
    <tr class="last:*:border-b-0 h-10">
      <td class="border-b border-elevated pl-4">{{ticket.title}}</td>
      <td class="border-b border-elevated">{{ticket.status}}</td>
      <td class="border-b border-elevated">{{ticket.createdAt | date:'dd.MM.yyyy'}}</td>
      <td class="border-b border-elevated">{{ticket.updatedAt | date:'dd.MM.yyyy'}}</td>
    </tr>
    } }
  </tbody>
</table>

<app-ticket-table-pagination [paginationState]="tableState()" (pageChange)="onPageChange($event)" />
