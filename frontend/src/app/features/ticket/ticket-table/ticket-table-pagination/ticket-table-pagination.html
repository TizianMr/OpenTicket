<div class="flex mt-2 w-full items-center justify-between">
  <p class="text-sm text-muted-foreground">
    Showing {{tableInfo().min}}-{{tableInfo().max}} of {{tableInfo().total}} tickets
  </p>

  <div class="flex gap-2">
    <div class="min-w-16 relative">
      <select
        class="w-full text-sm border bg-primary border-elevated rounded pl-3 pr-8 py-2 transition duration-300 ease focus:outline-none focus:border-accent hover:border-accent shadow-sm focus:shadow-md appearance-none"
        (change)="onSizeChange($event)">
        @for (option of pageSizeOptions; track $index) {
          <option [selected]="option === paginationState().size" [value]="option">{{ option }}</option>
        }
      </select>
      <svg class="ml-1 absolute top-2.5 right-2.5" sort-updown></svg>
    </div>

    <button [disabled]="isFirstPage()" (click)="onFirstPageClick()"
      class="bg-surface hover:bg-surface/80 rounded-md p-2" type="button" aria-label="Jump to first page">
      <svg chevron-left-double></svg>
    </button>
    <button [disabled]="isFirstPage()" (click)="onBackwardsClick()"
      class="bg-surface hover:bg-surface/80 rounded-md p-2" type="button" aria-label="Jump to previous page">
      <svg chevron-left></svg>
    </button>
    <button [disabled]="isLastPage()" (click)="onForwardClick()" class="bg-surface hover:bg-surface/80 rounded-md p-2"
      type="button" aria-label="Jump to next page">
      <svg chevron-right></svg>
    </button>
    <button [disabled]="isLastPage()" (click)="onLastPageClick()" class="bg-surface hover:bg-surface/80 rounded-md p-2"
      type="button" aria-label="Jump to last page">
      <svg chevron-right-double></svg>
    </button>
  </div>
