@if (isOpen()) {
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-primary/75 p-4"
  role="dialog"
  aria-modal="true"
  aria-labelledby="create-ticket-title"
  (click)="onOverlayClick($event)"
  (keydown)="onOverlayClick($event)"
  animate.leave="leaving-animation">
  <div
    animate.enter="enter-animation"
    class="w-full max-w-lg rounded-xl bg-surface p-6 text-white shadow-2xl ring-2 ring-primary/70">
    <div class="flex items-start justify-between gap-4">
      <h1
        id="create-ticket-title"
        class="text-xl font-bold">
        Create Ticket
      </h1>
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center bg-transparent"
        aria-label="Close create ticket modal"
        (click)="closeModal()">
        ✕
      </button>
    </div>

    <form
      #ticketForm="ngForm"
      class="mt-4 space-y-4"
      (ngSubmit)="submitTicket(ticketForm)">
      <div class="control">
        <label
          class="mb-1 block text-sm font-medium"
          for="ticket-title"
          >Title <span class="text-error">* Required</span></label
        >
        <input
          name="title"
          #title="ngModel"
          ngModel
          required
          id="ticket-title"
          type="text"
          class="w-full rounded border border-elevated bg-primary px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
          required />

        @if (ticketForm.submitted && title.invalid) {
        <p class="text-error">Title is a required input.</p>
        }
      </div>

      <div class="control">
        <label
          class="mb-1 block text-sm font-medium"
          for="ticket-desc"
          >Description <span class="text-error">* Required</span></label
        >
        <textarea
          name="description"
          #desc="ngModel"
          ngModel
          required
          id="ticket-desc"
          class="w-full rounded border border-elevated bg-primary px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary"
          rows="4"
          required></textarea>

        @if (ticketForm.submitted && desc.invalid) {
        <p class="text-error">Description is a required input.</p>
        }
      </div>

      @if (errorMsg()) {
      <p class="text-error">Failed to save ticket: {{ errorMsg() }}</p>
      }

      <div class="flex items-center justify-end gap-2 pt-2">
        <button
          type="button"
          class="rounded bg-primary px-4 py-2 text-sm font-semibold hover:bg-primary/80"
          (click)="closeModal()">
          Cancel
        </button>
        <button
          type="submit"
          class="rounded bg-accent px-4 py-2 w-18 text-sm flex justify-center font-semibold hover:bg-accent/80"
          [disabled]="isCreating()">
          @if (isCreating()) {
          <svg spinner-icon></svg>
          } @else { Save }
        </button>
      </div>
    </form>
  </div>
</div>
}
