<ng-container [appModal]="modalId()">
@if (isOpen()) {
  <div
    class="flex items-center justify-center"
    role="dialog"
    aria-modal="true"
    (click)="onOverlayClick($event)"
    (keydown)="onOverlayClick($event)"
    animate.leave="leaving-animation">
    <div
      animate.enter="enter-animation"
      class="w-full max-w-lg rounded-xl bg-surface p-6 shadow-2xl ring-2 ring-primary/70">
      <div class="flex items-start justify-between gap-4">
        <ng-content select="app-modal-header" />
        <button
          type="button"
          class="inline-flex h-8 w-8 items-center justify-center bg-transparent"
          aria-label="Close create ticket modal"
          (click)="this.close()">
          ✕
        </button>
      </div>
      <ng-content select="app-modal-content" />
    </div>
  </div>
}
</ng-container>
